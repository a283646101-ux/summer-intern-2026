server:
  port: 8081

spring:
  application:
    name: agent-demo

# LangChain4j 模型配置
langchain4j:
  open-ai:
    chat-model:
      api-key: ${ZHIPU_API_KEY:}
      model-name: glm-4-flash
      base-url: https://open.bigmodel.cn/api/paas/v4/
      temperature: 0.7
      max-tokens: 1024
      log-requests: true
      log-responses: true

logging:
  level:
    com.jaiot.agent: DEBUG
    dev.langchain4j: INFO
